name: Renovate
on:
  schedule:
    - cron: '0 3 * * 1'   # Mondays at 3 AM UTC
  workflow_dispatch:
  workflow_call:
    inputs:
      dry_run:
        type: boolean
        default: false
jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: renovatebot/github-action@v40
        with:
          configurationFile: .github/renovate-self-hosted.json5
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          RENOVATE_DRY_RUN: ${{ inputs.dry_run && 'full' || '' }}
